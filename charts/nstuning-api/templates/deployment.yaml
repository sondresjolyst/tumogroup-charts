apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nstuning-api.fullname" . }}
  labels:
    {{- include "nstuning-api.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "nstuning-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "nstuning-api.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "nstuning-api.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 7297
              protocol: TCP
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          env:
            {{- if .Values.persistence.enabled }}
            - name: Storage__ReportsPath
              value: {{ .Values.persistence.mountPath | quote }}
            - name: Storage__ImagesPath
              value: {{ .Values.persistence.imagesPath | quote }}
            {{- end }}
            {{- range .Values.env }}
            - name: {{ .name }}
              valueFrom:
                secretKeyRef:
                  key: {{ .secretKeyRef.key }}
                  name: {{ .secretKeyRef.name }}
            {{- end }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: reports
              mountPath: {{ .Values.persistence.mountPath }}
            - name: reports
              mountPath: {{ .Values.persistence.imagesPath }}
              subPath: {{ .Values.persistence.imagesSubPath }}
          {{- end }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: reports
          persistentVolumeClaim:
            claimName: {{ include "nstuning-api.fullname" . }}-reports
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
